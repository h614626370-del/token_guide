<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Token向云中间宣传块</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #111;
      font-family: "Microsoft YaHei UI", "PingFang SC", "Segoe UI", sans-serif;
    }

    .block {
      position: relative;
      width: 1000px;
      height: 760px;
      overflow: hidden;
      background: #d7ecff;
      color: #050507;
    }

    .shot {
      position: absolute;
      left: -470px;
      top: -118px;
      width: 2160px;
      height: 1024px;
      object-fit: cover;
      filter: saturate(1.16) contrast(1.06) brightness(1.05);
      transform: scale(1.03);
    }

    .wash {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(71, 148, 255, 0.25)),
        radial-gradient(circle at 50% 44%, transparent 0 44%, rgba(0, 54, 122, 0.16) 100%);
    }

    .captions {
      position: absolute;
      left: 18px;
      top: 108px;
      display: grid;
      gap: 14px;
      align-items: start;
      z-index: 2;
    }

    .caption {
      width: max-content;
      max-width: 920px;
      padding: 13px 22px 15px;
      color: #050507;
      background: #fff;
      box-shadow:
        0 4px 0 rgba(0, 0, 0, 0.18),
        0 13px 24px rgba(0, 0, 0, 0.14);
      font-size: 43px;
      line-height: 1.08;
      font-weight: 950;
      letter-spacing: 0;
      white-space: nowrap;
    }

    .caption.large {
      font-size: 47px;
    }

    .caption.accent {
      border-left: 9px solid #13bdb0;
      background: linear-gradient(90deg, #ffffff 0%, #eafffb 100%);
    }
  </style>
</head>
<body>
  <main class="block">
    <img class="shot" src="./assets/token-home-screenshot.png" alt="">
    <div class="wash"></div>
    <section class="captions">
      <div class="caption large">兄弟，别再古法编程了</div>
      <div class="caption accent">接上 AI API，效率直接拉满</div>
      <div class="caption">不用到处翻教程，不用反复踩坑</div>
      <div class="caption large">Token向云，一页搞定接入配置</div>
      <div class="caption">Codex / Claude / Gemini 都能用</div>
      <div class="caption accent">把时间留给产品，别耗在配置上</div>
    </section>
  </main>
</body>
</html>
