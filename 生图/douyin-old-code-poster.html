<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Token向云抖音风格宣传图</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #050507;
      font-family: "Microsoft YaHei UI", "PingFang SC", "Segoe UI", sans-serif;
    }

    .poster {
      position: relative;
      width: 1080px;
      height: 1920px;
      overflow: hidden;
      background:
        radial-gradient(circle at 52% 18%, rgba(30, 142, 151, 0.14), transparent 34%),
        radial-gradient(circle at 48% 62%, rgba(34, 98, 255, 0.2), transparent 30%),
        linear-gradient(180deg, #030305 0%, #08090d 42%, #040406 100%);
      color: #fff;
    }

    .stars {
      position: absolute;
      inset: 0;
      opacity: 0.78;
      background-image:
        radial-gradient(circle, rgba(255, 255, 255, 0.95) 0 1.4px, transparent 1.8px),
        radial-gradient(circle, rgba(126, 255, 235, 0.8) 0 1px, transparent 1.4px);
      background-size: 92px 112px, 137px 173px;
      background-position: 18px 32px, 56px 88px;
    }

    .status {
      position: absolute;
      top: 42px;
      left: 58px;
      right: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 35px;
      font-weight: 800;
      letter-spacing: 0;
      text-shadow: 0 2px 14px rgba(0, 0, 0, 0.65);
      z-index: 5;
    }

    .status-icons {
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 27px;
    }

    .battery {
      width: 62px;
      height: 30px;
      border: 3px solid #fff;
      border-radius: 6px;
      padding: 3px;
    }

    .battery::before {
      display: block;
      width: 72%;
      height: 100%;
      content: "";
      border-radius: 3px;
      background: #fff;
    }

    .topnav {
      position: absolute;
      top: 132px;
      left: 56px;
      right: 56px;
      z-index: 5;
      display: flex;
      align-items: center;
      gap: 40px;
      color: rgba(255, 255, 255, 0.7);
      font-size: 38px;
      font-weight: 800;
      white-space: nowrap;
    }

    .menu {
      width: 62px;
      height: 42px;
      position: relative;
      flex: 0 0 auto;
    }

    .menu::before,
    .menu::after,
    .menu span {
      position: absolute;
      left: 0;
      width: 62px;
      height: 6px;
      content: "";
      border-radius: 99px;
      background: #fff;
    }

    .menu::before {
      top: 0;
    }

    .menu span {
      top: 18px;
    }

    .menu::after {
      bottom: 0;
    }

    .active {
      position: relative;
      color: #fff;
    }

    .active::after {
      position: absolute;
      left: 50%;
      bottom: -20px;
      width: 74px;
      height: 5px;
      content: "";
      transform: translateX(-50%);
      border-radius: 999px;
      background: #fff;
    }

    .search {
      margin-left: auto;
      font-size: 66px;
      line-height: 1;
      color: #fff;
    }

    .stage {
      position: absolute;
      left: -18px;
      top: 540px;
      width: 1116px;
      height: 870px;
      overflow: hidden;
      border-top: 2px solid rgba(255, 255, 255, 0.34);
      border-bottom: 2px solid rgba(255, 255, 255, 0.18);
      box-shadow:
        0 0 0 1px rgba(0, 0, 0, 0.8),
        0 26px 90px rgba(31, 133, 255, 0.28);
      transform: rotate(-0.8deg);
      z-index: 2;
      background: #d9f5f8;
    }

    .shot {
      position: absolute;
      left: -522px;
      top: -14px;
      width: 2160px;
      height: 1024px;
      object-fit: cover;
      filter: saturate(1.18) contrast(1.05) brightness(1.04);
      transform: scale(1.04);
    }

    .blue-wash {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(34, 154, 255, 0.04), rgba(45, 134, 255, 0.28)),
        radial-gradient(circle at 50% 48%, transparent 0 34%, rgba(0, 26, 56, 0.26) 70%);
      pointer-events: none;
    }

    .caption-stack {
      position: absolute;
      left: 20px;
      top: 632px;
      z-index: 4;
      display: grid;
      gap: 16px;
      align-items: start;
    }

    .caption {
      width: max-content;
      max-width: 820px;
      padding: 12px 24px 15px;
      color: #0a0b0d;
      background: #fff;
      box-shadow: 0 3px 0 rgba(0, 0, 0, 0.16), 0 12px 22px rgba(0, 0, 0, 0.12);
      font-size: 40px;
      line-height: 1.12;
      font-weight: 900;
      letter-spacing: 0;
      white-space: nowrap;
    }

    .caption.big {
      font-size: 43px;
    }

    .actions {
      position: absolute;
      right: 24px;
      top: 825px;
      z-index: 6;
      display: grid;
      gap: 34px;
      justify-items: center;
      color: #fff;
      text-shadow: 0 3px 12px rgba(0, 0, 0, 0.76);
    }

    .avatar {
      width: 102px;
      height: 102px;
      border: 5px solid #fff;
      border-radius: 50%;
      background:
        linear-gradient(135deg, rgba(16, 108, 111, 0.9), rgba(20, 190, 174, 0.88)),
        url("./assets/token-home-screenshot.png") center / cover;
      box-shadow: 0 12px 26px rgba(0, 0, 0, 0.46);
    }

    .plus {
      position: absolute;
      right: 8px;
      top: 84px;
      display: grid;
      width: 42px;
      height: 42px;
      place-items: center;
      border-radius: 50%;
      background: #ff2d55;
      font-size: 38px;
      font-weight: 900;
      line-height: 1;
    }

    .action {
      display: grid;
      gap: 6px;
      justify-items: center;
      font-size: 34px;
      font-weight: 800;
    }

    .icon {
      font-size: 80px;
      line-height: 0.9;
      font-family: "Segoe UI Symbol", "Microsoft YaHei UI", sans-serif;
    }

    .comment-icon {
      width: 92px;
      height: 74px;
      border-radius: 50%;
      background: #fff;
      position: relative;
    }

    .comment-icon::after {
      position: absolute;
      right: 8px;
      bottom: -8px;
      content: "";
      border-width: 18px 4px 0 22px;
      border-style: solid;
      border-color: #fff transparent transparent transparent;
      transform: rotate(-20deg);
    }

    .comment-icon span {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      color: #304044;
      font-size: 34px;
      font-weight: 900;
      letter-spacing: 4px;
    }

    .filter-tag {
      position: absolute;
      left: 38px;
      bottom: 314px;
      z-index: 5;
      width: 672px;
      padding: 20px 26px;
      border-radius: 8px;
      background: rgba(39, 39, 42, 0.9);
      color: #fff;
      font-size: 32px;
      line-height: 1.42;
      font-weight: 700;
    }

    .filter-tag strong {
      display: inline-grid;
      width: 62px;
      height: 62px;
      margin-right: 14px;
      place-items: center;
      border-radius: 9px;
      background: #f0b93e;
      vertical-align: middle;
      font-size: 34px;
    }

    .author {
      position: absolute;
      left: 36px;
      right: 150px;
      bottom: 164px;
      z-index: 5;
      color: #fff;
      text-shadow: 0 3px 14px rgba(0, 0, 0, 0.72);
    }

    .author-name {
      margin-bottom: 18px;
      font-size: 40px;
      line-height: 1;
      font-weight: 900;
    }

    .desc {
      font-size: 35px;
      line-height: 1.32;
      font-weight: 700;
    }

    .search-row {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 86px;
      z-index: 6;
      height: 76px;
      padding: 0 44px;
      display: flex;
      align-items: center;
      gap: 18px;
      background: rgba(24, 24, 27, 0.94);
      color: #fff;
      font-size: 34px;
      font-weight: 850;
    }

    .bottom-nav {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 6;
      height: 86px;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      align-items: center;
      justify-items: center;
      color: rgba(255, 255, 255, 0.58);
      background: #050507;
      font-size: 32px;
      font-weight: 850;
    }

    .bottom-nav .on {
      color: #fff;
    }

    .handle {
      position: absolute;
      left: 50%;
      bottom: 10px;
      width: 156px;
      height: 5px;
      transform: translateX(-50%);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.36);
      z-index: 7;
    }
  </style>
</head>
<body>
  <main class="poster">
    <div class="stars"></div>

    <div class="status">
      <div>23:31</div>
      <div class="status-icons">
        <span>5G</span>
        <span>▮▮▮</span>
        <span>WiFi</span>
        <span>54%</span>
        <span class="battery"></span>
      </div>
    </div>

    <div class="topnav">
      <div class="menu"><span></span></div>
      <span>团购</span>
      <span>石家庄</span>
      <span>关注</span>
      <span>商城</span>
      <span class="active">推荐</span>
      <span class="search">⌕</span>
    </div>

    <section class="stage">
      <img class="shot" src="./assets/token-home-screenshot.png" alt="">
      <div class="blue-wash"></div>
    </section>

    <section class="caption-stack">
      <div class="caption">兄弟，别再古法编程了</div>
      <div class="caption big">接上 AI API，效率直接拉满</div>
      <div class="caption">不用到处翻教程，不用反复踩坑</div>
      <div class="caption big">Token向云，一页搞定接入配置</div>
      <div class="caption">Codex / Claude / Gemini 都能用</div>
      <div class="caption">把时间留给产品，别耗在配置上</div>
    </section>

    <aside class="actions">
      <div style="position: relative;">
        <div class="avatar"></div>
        <div class="plus">+</div>
      </div>
      <div class="action"><div class="icon">♥</div><div>88</div></div>
      <div class="action"><div class="comment-icon"><span>•••</span></div><div>36</div></div>
      <div class="action"><div class="icon">★</div><div>21</div></div>
      <div class="action"><div class="icon">↗</div><div>9</div></div>
    </aside>

    <div class="filter-tag">
      <strong>✦</strong>拍同款｜治愈系高级滤镜调色<br>
      <span style="color: rgba(255,255,255,.72);">AI 接入效率提升指南</span>
    </div>

    <section class="author">
      <div class="author-name">@Token向云</div>
      <div class="desc">别再手搓配置了，API 网关、新手指南、客户端接入一次讲明白 #AI工具 #API接入 #效率提升</div>
    </section>

    <div class="search-row">
      <span style="font-size: 44px;">⌕</span>
      <span>相关搜索 · AI API 怎么接入</span>
      <span style="margin-left: auto;">›</span>
    </div>

    <nav class="bottom-nav">
      <span class="on">首页↵</span>
      <span>朋友</span>
      <span>+</span>
      <span>消息</span>
      <span>我</span>
    </nav>
    <div class="handle"></div>
  </main>
</body>
</html>
